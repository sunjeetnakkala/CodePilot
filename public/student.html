<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodePilot | Student Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">CodePilot</div>
      <nav class="main-nav">
        <a href="/index.html">Home</a>
        <a href="/student.html" class="active">Student</a>
        <a href="/lesson.html">Lesson</a>
        <a href="/chat.html">AI Chat</a>
        <a href="/reports.html">Reports</a>
        <a href="/manager.html">Manager</a>
        <a href="/logout.html">Logout</a>
      </nav>
    </header>

    <main class="container reveal">
      <section class="card">
        <h1>User Management</h1>
        <p>Create, update, and delete student accounts.</p>
      </section>

      <section class="grid two-col">
        <article class="card">
          <h2>Add New User</h2>
          <form id="user-form" class="form-group">
            <label>Email <span class="required">*</span></label>
            <input type="email" name="email" required />
            
            <label>Password <span class="required">*</span></label>
            <input type="password" name="password" required />
            
            <label>Role <span class="required">*</span></label>
            <select name="role" required>
              <option value="">Select role</option>
              <option value="STUDENT">Student</option>
              <option value="MANAGER">Manager</option>
            </select>
            
            <label>Skill Level</label>
            <input type="text" name="skillLevel" placeholder="e.g., Beginner, Intermediate" />
            
            <label>Preferred Language</label>
            <input type="text" name="preferredLanguage" placeholder="e.g., Python, JavaScript" />
            
            <button type="submit" class="btn btn-primary">Create User</button>
          </form>
          <div id="user-form-message" class="message"></div>
        </article>

        <article class="card">
          <h2>All Users</h2>
          <div class="filter-actions">
            <button id="refresh-users-btn" class="btn btn-ghost">Refresh</button>
          </div>
          <ul id="user-list" class="list"></ul>
        </article>
      </section>

      <section class="card">
        <h2>Edit User</h2>
        <form id="edit-user-form" class="form-group" style="display: none;">
          <input type="hidden" name="userID" id="edit-user-id" />
          
          <label>Email <span class="required">*</span></label>
          <input type="email" name="email" id="edit-email" required />
          
          <label>Password <span class="required">*</span></label>
          <input type="password" name="password" id="edit-password" required />
          
          <label>Role <span class="required">*</span></label>
          <select name="role" id="edit-role" required>
            <option value="STUDENT">Student</option>
            <option value="MANAGER">Manager</option>
          </select>
          
          <label>Skill Level</label>
          <input type="text" name="skillLevel" id="edit-skillLevel" />
          
          <label>Preferred Language</label>
          <input type="text" name="preferredLanguage" id="edit-preferredLanguage" />
          
          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Save Changes</button>
            <button type="button" id="cancel-edit-btn" class="btn btn-ghost">Cancel</button>
          </div>
        </form>
        <div id="edit-user-message" class="message"></div>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/student.js"></script>
  </body>
</html>
