<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodePilot | Manager Console</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">CodePilot</div>
      <nav class="main-nav">
        <a href="/index.html">Home</a>
        <a href="/student.html">Student</a>
        <a href="/lesson.html">Lesson</a>
        <a href="/chat.html">AI Chat</a>
        <a href="/manager.html" class="active">Manager</a>
      </nav>
    </header>

    <main class="container reveal">
      <section class="card">
        <h1>Manager Console</h1>
        <p>Moderation queue and operational insight panel.</p>
      </section>

      <section class="grid two-col">
        <article class="card">
          <h2>Content Flags</h2>
          <div class="filter-actions">
            <button id="refresh-flags-btn" class="btn btn-ghost">Refresh</button>
          </div>
          <ul id="flag-list" class="list"></ul>
        </article>

        <article class="card">
          <h2>Edit Flag Status</h2>
          <form id="flag-form" class="form-group" style="display: none;">
            <input type="hidden" name="flagID" id="form-flagID" />
            
            <label>User ID</label>
            <input type="number" id="form-flagUserID" disabled />
            
            <label>Description</label>
            <textarea id="form-flagDescription" rows="3" disabled></textarea>
            
            <label>Status <span class="required">*</span></label>
            <select name="status" id="form-flagStatus" required>
              <option value="Open">Open</option>
              <option value="In Review">In Review</option>
              <option value="Resolved">Resolved</option>
              <option value="Dismissed">Dismissed</option>
            </select>
            
            <label>Notes (optional)</label>
            <textarea name="notes" id="form-flagNotes" rows="2" placeholder="Add moderator notes..."></textarea>
            
            <div class="form-actions">
              <button type="submit" class="btn btn-primary">Update Flag</button>
              <button type="button" id="cancel-flag-btn" class="btn btn-ghost">Cancel</button>
            </div>
          </form>
          <div id="flag-message" class="message"></div>
        </article>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/manager.js"></script>
  </body>
</html>
