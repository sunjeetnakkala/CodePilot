<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodePilot | Logout</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="site-header">
      <div class="brand">CodePilot</div>
      <nav class="main-nav">
        <a href="/index.html">Home</a>
        <a href="/login.html">Login</a>
        <a href="/student.html">Student</a>
        <a href="/lesson.html">Lesson</a>
        <a href="/chat.html">AI Chat</a>
        <a href="/reports.html">Reports</a>
        <a href="/manager.html">Manager</a>
      </nav>
    </header>

    <main class="container reveal">
      <section class="card" style="max-width: 560px; margin: 0 auto; text-align: center;">
        <p class="kicker">Session end</p>
        <h1>You have been signed out</h1>
        <p>
          Your local session data has been cleared. Use the button below to go back to the login screen.
        </p>
        <div class="hero-actions" style="justify-content: center;">
          <a class="btn btn-primary" href="/login.html">Go to Login</a>
          <a class="btn btn-ghost" href="/index.html">Return Home</a>
        </div>
      </section>
    </main>

    <script>
      localStorage.removeItem("user");
      localStorage.removeItem("token");
      sessionStorage.clear();
    </script>
  </body>
</html>
