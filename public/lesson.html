<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodePilot | Lesson Workspace</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">CodePilot</div>
      <nav class="main-nav">
        <a href="/index.html">Home</a>
        <a href="/student.html">Student</a>
        <a href="/lesson.html" class="active">Lesson</a>
        <a href="/chat.html">AI Chat</a>
        <a href="/reports.html">Reports</a>
        <a href="/manager.html">Manager</a>
      </nav>
    </header>

    <main class="container reveal">
      <section class="card">
        <h1>Learning Paths & Lessons</h1>
        <p>Manage learning paths and their associated lessons.</p>
      </section>

      <!-- LEARNING PATHS SECTION -->
      <section class="card">
        <h2>Learning Paths</h2>
        <div class="filter-actions">
          <button id="refresh-paths-btn" class="btn btn-ghost">Refresh</button>
          <button id="toggle-path-form-btn" class="btn btn-primary">+ Add Path</button>
        </div>
        <ul id="path-list" class="list"></ul>
      </section>

      <section class="card">
        <h2>Add/Edit Learning Path</h2>
        <form id="path-form" class="form-group" style="display: none;">
          <input type="hidden" name="pathID" id="form-pathID" />
          
          <label>Path Name <span class="required">*</span></label>
          <input type="text" name="pathName" id="form-pathName" required />
          
          <label>Description</label>
          <textarea name="description" id="form-description" rows="3"></textarea>
          
          <label>Difficulty</label>
          <select name="difficulty" id="form-difficulty">
            <option value="">Select difficulty</option>
            <option value="Beginner">Beginner</option>
            <option value="Intermediate">Intermediate</option>
            <option value="Advanced">Advanced</option>
          </select>
          
          <label>Estimated Hours</label>
          <input type="number" name="estimatedHours" id="form-estimatedHours" />
          
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="path-submit-btn">Save Path</button>
            <button type="button" id="cancel-path-btn" class="btn btn-ghost">Cancel</button>
          </div>
        </form>
        <div id="path-message" class="message"></div>
      </section>

      <!-- LESSONS SECTION -->
      <section class="card">
        <h2>Lessons</h2>
        <div class="filter-actions">
          <button id="refresh-lessons-btn" class="btn btn-ghost">Refresh</button>
          <button id="toggle-lesson-form-btn" class="btn btn-primary">+ Add Lesson</button>
        </div>
        <ul id="lesson-list" class="list"></ul>
      </section>

      <section class="card">
        <h2>Add/Edit Lesson</h2>
        <form id="lesson-form" class="form-group" style="display: none;">
          <input type="hidden" name="lessonID" id="form-lessonID" />
          
          <label>Path <span class="required">*</span></label>
          <select name="pathID" id="form-lessonPathID" required>
            <option value="">Select a learning path</option>
          </select>
          
          <label>Lesson Title <span class="required">*</span></label>
          <input type="text" name="title" id="form-lessonTitle" required />
          
          <label>Content</label>
          <textarea name="content" id="form-lessonContent" rows="4"></textarea>
          
          <div class="form-actions">
            <button type="submit" class="btn btn-primary" id="lesson-submit-btn">Save Lesson</button>
            <button type="button" id="cancel-lesson-btn" class="btn btn-ghost">Cancel</button>
          </div>
        </form>
        <div id="lesson-message" class="message"></div>
      </section>
    </main>

    <script src="/js/api.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/lesson.js"></script>
  </body>
</html>
