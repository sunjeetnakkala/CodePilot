<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CodePilot | Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <style>
      .auth-wrap {
        width: min(760px, 92%);
        margin: 48px auto;
      }

      .auth-card {
        max-width: 460px;
        margin: 0 auto;
      }

      .auth-card h1 {
        margin: 8px 0 10px;
        font-size: clamp(1.8rem, 4vw, 2.6rem);
      }

      .auth-card .form-group {
        margin-top: 16px;
      }

      .auth-card .form-group input {
        width: 100%;
      }

      .auth-message {
        display: none;
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 12px;
        font-size: 0.95rem;
      }

      .auth-message.error {
        color: var(--error);
        background: rgba(220, 38, 38, 0.08);
        border: 1px solid rgba(220, 38, 38, 0.18);
      }

      .auth-message.success {
        color: var(--success);
        background: rgba(22, 163, 74, 0.08);
        border: 1px solid rgba(22, 163, 74, 0.18);
      }

      .auth-footer {
        margin-top: 18px;
        color: var(--muted);
      }

      .auth-footer a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 500;
      }

      .auth-footer a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="site-header">
      <div class="brand">CodePilot</div>
      <nav class="main-nav">
        <a href="/index.html">Home</a>
        <a href="/login.html" class="active">Login</a>
        <a href="/signup.html">Create Account</a>
      </nav>
    </header>

    <main class="auth-wrap">
      <section class="card auth-card reveal">
        <p class="kicker">Secure access</p>
        <h1>Log in to CodePilot</h1>
        <p>
          Use your email and password to continue to your dashboard.
        </p>

        <div class="auth-message error" id="errorMsg"></div>
        <div class="auth-message success" id="successMsg"></div>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required />
          </div>
          <button class="btn btn-primary" type="submit">Login</button>
        </form>

        <p class="auth-footer">
          Don't have an account? <a href="/signup.html">Create one here</a>
        </p>
      </section>
    </main>

    <script src="/js/app.js"></script>
    <script>
      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const errorMsg = document.getElementById("errorMsg");
        const successMsg = document.getElementById("successMsg");

        errorMsg.style.display = "none";
        successMsg.style.display = "none";

        try {
          const response = await fetch("/api/login", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await response.json();

          if (response.ok) {
            successMsg.textContent = "Login successful! Redirecting...";
            successMsg.style.display = "block";

            localStorage.setItem("user", JSON.stringify(data.user));
            localStorage.setItem("token", data.token);

            setTimeout(() => {
              window.location.href = "/index.html";
            }, 1200);
          } else {
            errorMsg.textContent = data.error || "Login failed";
            errorMsg.style.display = "block";
          }
        } catch (err) {
          errorMsg.textContent = "Error: " + err.message;
          errorMsg.style.display = "block";
        }
      });
    </script>
  </body>
</html>
